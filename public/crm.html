<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CRM Recuperação — Sonia / IREC 2</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, "Segoe UI", Roboto, sans-serif; background: #0b141a; color: #e9edef; padding: 20px; }
  h1 { font-size: 20px; margin-bottom: 4px; }
  .sub { color: #8696a0; font-size: 13px; margin-bottom: 18px; }
  .kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px,1fr)); gap: 12px; margin-bottom: 24px; }
  .kpi { background: #111b21; border: 1px solid #2a3942; border-radius: 12px; padding: 14px 16px; }
  .kpi .v { font-size: 30px; font-weight: 700; }
  .kpi .l { font-size: 12px; color: #8696a0; margin-top: 2px; }
  .kpi.hero { background: #0a3622; border-color: #1f6b45; }
  .kpi.hero .v { color: #6fe39f; }
  .cols { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px,1fr)); gap: 12px; }
  .col { background: #111b21; border: 1px solid #2a3942; border-radius: 12px; padding: 12px; }
  .col h3 { font-size: 12px; text-transform: uppercase; letter-spacing: .5px; color: #8696a0; margin-bottom: 10px; display: flex; justify-content: space-between; }
  .card { background: #202c33; border-radius: 8px; padding: 9px 11px; margin-bottom: 8px; font-size: 13px; }
  .card .nm { font-weight: 600; }
  .card .meta { color: #8696a0; font-size: 11px; margin-top: 2px; }
  .badge { font-size: 10px; padding: 1px 6px; border-radius: 4px; background: #2a3942; color: #d4deca; }
  .refresh { float: right; background: #0a3622; color:#d4deca; border:none; padding:6px 12px; border-radius:8px; cursor:pointer; font-size:12px; }
  a { color:#6fe39f; }
</style>
</head>
<body>
  <button class="refresh" onclick="load()">Atualizar</button>
  <h1>CRM Recuperação de Vendas — IREC 2</h1>
  <div class="sub">Sonia Dalva · piloto · dados ao vivo do microserviço · <a href="/">abrir simulador</a></div>
  <div class="kpis" id="kpis"></div>
  <div class="cols" id="cols"></div>

<script>
const STATES = [
  ["DETECTADO","Detectado"],["ABORDADO","Abordado"],["EM_CONVERSA","Em conversa"],
  ["OBJECAO","Objeção"],["RECUPERADO","Recuperado ✅"],["ESCALADO","Escalar humano 🙋"],["PERDIDO","Perdido"]
];
function brl(n){ return "R$ " + (n||0).toLocaleString("pt-BR",{minimumFractionDigits:2}); }
async function load(){
  const m = await (await fetch("/api/metrics")).json();
  const leads = await (await fetch("/api/leads")).json();
  document.getElementById("kpis").innerHTML = `
    <div class="kpi hero"><div class="v">${brl(m.faturamento_recuperado)}</div><div class="l">Faturamento recuperado</div></div>
    <div class="kpi"><div class="v">${m.recuperados}</div><div class="l">Vendas recuperadas</div></div>
    <div class="kpi"><div class="v">${m.detectados}</div><div class="l">Abandonos detectados</div></div>
    <div class="kpi"><div class="v">${m.taxa_resposta}%</div><div class="l">Taxa de resposta</div></div>
    <div class="kpi"><div class="v">${m.taxa_recuperacao}%</div><div class="l">Taxa de recuperação</div></div>
    <div class="kpi"><div class="v">${m.em_conversa}</div><div class="l">Em conversa agora</div></div>
    <div class="kpi"><div class="v">${m.escalados}</div><div class="l">Escalados / opt-outs ${m.optouts}</div></div>`;
  const byState = Object.fromEntries(STATES.map(([k])=>[k,[]]));
  leads.forEach(l => (byState[l.state] = byState[l.state]||[]).push(l));
  document.getElementById("cols").innerHTML = STATES.map(([k,label]) => `
    <div class="col"><h3><span>${label}</span><span>${(byState[k]||[]).length}</span></h3>
      ${(byState[k]||[]).map(l => `<div class="card">
        <div class="nm">${l.firstName} <span class="badge">${l.product}</span></div>
        <div class="meta">…${l.phone.slice(-4)} · ${l.messages.length} msg${l.recoveredValue?` · ${brl(l.recoveredValue)}`:""}</div>
      </div>`).join("") || '<div class="meta">vazio</div>'}
    </div>`).join("");
}
load(); setInterval(load, 8000);
</script>
</body>
</html>
