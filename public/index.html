<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Recuperador de Vendas IA — Simulador (Sonia / IREC 2)</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, "Segoe UI", Roboto, sans-serif; background: #0b141a; color: #e9edef; height: 100vh; display: flex; flex-direction: column; }
  header { background: #1f2c33; padding: 12px 16px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #2a3942; }
  .avatar { width: 40px; height: 40px; border-radius: 50%; background: #0a3622; display: flex; align-items: center; justify-content: center; font-weight: 700; color: #d4deca; font-size: 18px; }
  .htitle { font-weight: 600; font-size: 16px; }
  .hsub { font-size: 12px; color: #8696a0; }
  .bar { background: #111b21; padding: 10px 16px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; border-bottom: 1px solid #2a3942; }
  .bar label { font-size: 12px; color: #8696a0; }
  select { background: #2a3942; color: #e9edef; border: none; padding: 8px 10px; border-radius: 8px; font-size: 13px; flex: 1; min-width: 200px; }
  button.reset { background: #0a3622; color: #d4deca; border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 13px; }
  #chat { flex: 1; overflow-y: auto; padding: 18px 8% 18px 8%; display: flex; flex-direction: column; gap: 8px; background-image: linear-gradient(rgba(11,20,26,.96), rgba(11,20,26,.96)); }
  .msg { max-width: 75%; padding: 8px 12px; border-radius: 10px; font-size: 14.5px; line-height: 1.45; white-space: pre-wrap; word-wrap: break-word; box-shadow: 0 1px 1px rgba(0,0,0,.2); }
  .sonia { align-self: flex-start; background: #202c33; border-top-left-radius: 2px; }
  .lead { align-self: flex-end; background: #005c4b; border-top-right-radius: 2px; }
  .meta { font-size: 10px; color: #8696a0; margin-top: 3px; text-align: right; }
  .typing { align-self: flex-start; color: #8696a0; font-size: 13px; font-style: italic; padding: 4px 12px; }
  .sysnote { align-self: center; background: #2a2410; color: #e7c878; font-size: 11px; padding: 4px 10px; border-radius: 6px; }
  footer { background: #1f2c33; padding: 10px 16px; display: flex; gap: 10px; align-items: flex-end; }
  textarea { flex: 1; background: #2a3942; color: #e9edef; border: none; border-radius: 18px; padding: 11px 14px; font-size: 14.5px; resize: none; max-height: 120px; font-family: inherit; }
  button.send { background: #00a884; color: #0b141a; border: none; width: 44px; height: 44px; border-radius: 50%; cursor: pointer; font-size: 18px; font-weight: 700; flex-shrink: 0; }
  button.send:disabled { opacity: .5; cursor: default; }
</style>
</head>
<body>
  <header>
    <div class="avatar">S</div>
    <div>
      <div class="htitle">Sonia Dalva</div>
      <div class="hsub">recuperador de vendas · simulador IREC 2</div>
    </div>
  </header>
  <div class="bar">
    <label>Gatilho:</label>
    <select id="gatilho"></select>
    <button class="reset" id="reset">Reiniciar conversa</button>
  </div>
  <div id="chat"></div>
  <footer>
    <textarea id="input" rows="1" placeholder="Escreva como a lead responderia..."></textarea>
    <button class="send" id="send">➤</button>
  </footer>

<script>
let GATILHOS = [];
let messages = []; // {role:'user'|'assistant', content:''}
const chat = document.getElementById('chat');
const sel = document.getElementById('gatilho');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send');

function bubble(role, text, sys) {
  const d = document.createElement('div');
  if (sys) { d.className = 'sysnote'; d.textContent = text; }
  else { d.className = 'msg ' + (role === 'assistant' ? 'sonia' : 'lead'); d.textContent = text; }
  chat.appendChild(d);
  chat.scrollTop = chat.scrollHeight;
  return d;
}
function typing(on) {
  let t = document.getElementById('typing');
  if (on && !t) { t = document.createElement('div'); t.id = 'typing'; t.className = 'typing'; t.textContent = 'Sonia está digitando...'; chat.appendChild(t); chat.scrollTop = chat.scrollHeight; }
  if (!on && t) t.remove();
}

async function startConversation() {
  chat.innerHTML = '';
  messages = [];
  const g = GATILHOS.find(x => x.key === sel.value);
  bubble('system', 'Gatilho: ' + g.rotulo + ' — a Sonia inicia o contato', true);
  // a abertura é a primeira fala da Sonia (já roteirizada)
  messages.push({ role: 'assistant', content: g.abertura });
  bubble('assistant', g.abertura);
}

async function sendMsg() {
  const text = input.value.trim();
  if (!text) return;
  input.value = ''; input.style.height = 'auto';
  bubble('user', text);
  messages.push({ role: 'user', content: text });
  sendBtn.disabled = true; typing(true);
  try {
    const r = await fetch('/api/chat', {
      method: 'POST', headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ gatilho: sel.value, messages })
    });
    const data = await r.json();
    typing(false);
    if (data.error) { bubble('system', 'Erro: ' + data.error, true); }
    else {
      messages.push({ role: 'assistant', content: data.reply });
      bubble('assistant', data.reply);
      if (data.status === 'escalado') bubble('system', '→ estado: ESCALADO para humano', true);
      if (data.status === 'optout') bubble('system', '→ estado: OPT-OUT (lead pediu SAIR) — agente parou', true);
    }
  } catch (e) { typing(false); bubble('system', 'Falha de rede: ' + e.message, true); }
  sendBtn.disabled = false; input.focus();
}

input.addEventListener('input', () => { input.style.height = 'auto'; input.style.height = Math.min(input.scrollHeight, 120) + 'px'; });
input.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); } });
sendBtn.addEventListener('click', sendMsg);
document.getElementById('reset').addEventListener('click', startConversation);
sel.addEventListener('change', startConversation);

(async function init() {
  const r = await fetch('/api/gatilhos'); GATILHOS = await r.json();
  sel.innerHTML = GATILHOS.map(g => '<option value="' + g.key + '">' + g.rotulo + '</option>').join('');
  startConversation();
})();
</script>
</body>
</html>
